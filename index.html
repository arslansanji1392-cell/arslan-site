<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>گردونه شانس</title>
<style>
body {
    background: #111;
    color: #fff;
    text-align: center;
    font-family: sans-serif;
}

h2 {
    margin-top: 20px;
    font-size: 28px;
}

#wheel {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    border: 8px solid #fff;
    margin: 30px auto;
    position: relative;
    overflow: hidden;
    transition: transform 5s ease;
}

.slice {
    width: 50%;
    height: 50%;
    position: absolute;
    left: 50%;
    top: 50%;
    transform-origin: 0% 0%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
}

button {
    padding: 15px 30px;
    font-size: 20px;
    border: none;
    border-radius: 10px;
    background: orange;
    color: #000;
    cursor: pointer;
    margin-top: 20px;
}
</style>
</head>
<body>

<h2>کلیک کن تا برنده شی!</h2>

<div id="wheel"></div>

<button onclick="spinWheel()">گردوندن</button>

<script>
const prizes = [
    "پوچ",
    "۲۰ هزار تومان",
    "۴۰ هزار تومان",
    "۶۰ هزار تومان",
    "۸۰ هزار تومان",
    "۱۲۰ هزار تومان",
    "پوچ"
];

const colors = [
    "green",
    "red",
    "green",
    "red",
    "green",
    "red",
    "green"
];

const wheel = document.getElementById("wheel");

for (let i = 0; i < 7; i++) {
    const slice = document.createElement("div");
    slice.className = "slice";
    slice.style.background = colors[i];
    slice.style.transform = `rotate(${(360/7)*i}deg) skewY(-50deg)`;
    slice.innerHTML = prizes[i];
    wheel.appendChild(slice);
}

function spinWheel() {
    const randomSpin = Math.floor(Math.random() * 3600) + 360;
    wheel.style.transform = `rotate(${randomSpin}deg)`;
}
</script>

</body>
</html>
