<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>گردونه شانس</title>
<style>
body {
    background: #000;
    color: #ffd700;
    text-align: center;
    font-family: sans-serif;
}

h2 {
    margin-top: 20px;
    font-size: 26px;
    color: #ffd700;
}

#wheel {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    margin: 30px auto;
    position: relative;
    overflow: hidden;
    border: 8px solid #ffd700;
    transition: transform 4s ease-out;
}

/* هر تکه گردونه */
.slice {
    position: absolute;
    width: 50%;
    height: 50%;
    left: 50%;
    top: 50%;
    transform-origin: 0% 0%;
}

/* دکمه */
button {
    padding: 15px 40px;
    font-size: 22px;
    border: none;
    border-radius: 10px;
    background: #ffd700;
    color: #000;
    cursor: pointer;
    margin-top: 20px;
    font-weight: bold;
}
</style>
</head>
<body>

<h2>کلیک کن تا برنده شی!</h2>

<div id="wheel"></div>

<button onclick="spinWheel()">گردوندن</button>

<script>
const colors = [
    "green",
    "red",
    "green",
    "red",
    "green",
    "red",
    "green"
];

const wheel = document.getElementById("wheel");

for (let i = 0; i < 7; i++) {
    const slice = document.createElement("div");
    slice.className = "slice";
    slice.style.background = colors[i];
    slice.style.transform = `rotate(${(360/7)*i}deg) skewY(-50deg)`;
    wheel.appendChild(slice);
}

function spinWheel() {
    const randomSpin = Math.floor(Math.random() * 3600) + 360;
    wheel.style.transform = `rotate(${randomSpin}deg)`;
}
</script>

</body>
</html>
